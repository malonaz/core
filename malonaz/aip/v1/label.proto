syntax = "proto3";

package malonaz.aip.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/malonaz/core/genproto/aip/v1";

// A label definition declared by a service.
message Label {
  option (buf.validate.message).cel = {
    id: "label.key_or_dynamic_key"
    expression: "this.key != '' || this.dynamic_key != ''"
    message: "either key or dynamic_key must be set"
  };

  // The label key, e.g. "user.onikisu.com/last-sync".
  string key = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^([a-zA-Z0-9]([a-zA-Z0-9.-]{0,251}[a-zA-Z0-9])?/)?[a-zA-Z0-9]([a-zA-Z0-9_.-]{0,61}[a-zA-Z0-9])?$"
    }
  ];

  // Dynamic keys use "dns.prefix/\{variable1\}.\{variable2\}".
  // These will be used in GetKey function, in the order they appear in the key.
  string dynamic_key = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[a-zA-Z0-9]([a-zA-Z0-9.-]{0,251}[a-zA-Z0-9])?/\\{[a-zA-Z0-9_]+\\}(\\.\\{[a-zA-Z0-9_]+\\})*$"
    }
  ];

  // Human-readable description of the label's purpose.
  string description = 3 [(buf.validate.field).required = true];

  // Optional allowed values. If empty, any value is accepted.
  repeated string values = 4 [(buf.validate.field).repeated.items.string = {
    max_len: 63
    pattern: "^[a-z0-9_\\-\\p{L}]*$"
  }];
}
