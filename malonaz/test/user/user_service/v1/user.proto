syntax = "proto3";

package malonaz.test.user.user_service.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "malonaz/codegen/aip/v1/aip.proto";
import "malonaz/test/user/v1/user.proto";

option go_package = "github.com/malonaz/core/genproto/test/user/user_service/v1";

// Request message for UserService.CreateUser.
message CreateUserRequest {
  // The parent organization.
  // Format: organizations/{organization}
  string parent = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "user.test.malonaz.com/Organization"
  ];

  // The ID to use for the resource.
  string user_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 63
      pattern: "^[a-z0-9](-?[a-z0-9])*$"
    }
  ];

  // The user to create.
  malonaz.test.user.v1.User user = 3 [(buf.validate.field).required = true];

  // A unique identifier for this request.
  string request_id = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // If set, validate the request and preview the response, but do not actually create the resource.
  bool validate_only = 5;
}

// Request message for UserService.GetUser.
message GetUserRequest {
  // The resource name of the user to retrieve.
  // Format: organizations/{organization}/users/{user}
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "user.test.malonaz.com/User"
  ];
}

// Request message for UserService.UpdateUser.
message UpdateUserRequest {
  option (malonaz.codegen.aip.v1.update) = {
    paths: [
      "display_name",
      "email_address",
      "phone_number",
      "labels",
      "metadata",
      "metadata.*"
    ]
  };
  option (buf.validate.message).cel = {
    id: "user.name_required"
    message: "user.name must be set"
    expression: "has(this.user.name)"
  };

  // The user to update.
  malonaz.test.user.v1.User user = 1 [(buf.validate.field).ignore = IGNORE_ALWAYS];

  // The list of fields to update.
  google.protobuf.FieldMask update_mask = 2 [(buf.validate.field).required = true];
}

// Request message for UserService.DeleteUser.
message DeleteUserRequest {
  // The resource name of the user to delete.
  // Format: organizations/{organization}/users/{user}
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "user.test.malonaz.com/User"
  ];

  // If true, and the user is not found, the request will succeed
  // but no action will be taken on the server.
  bool allow_missing = 2;

  // If set, the request will only succeed if the current etag matches this value.
  string etag = 3;
}

// Request message for UserService.ListUsers.
message ListUsersRequest {
  option (malonaz.codegen.aip.v1.pagination) = {default_page_size: 100};
  option (malonaz.codegen.aip.v1.ordering) = {
    paths: [
      "create_time",
      "update_time",
      "display_name"
    ]
    default: "create_time desc"
  };
  option (malonaz.codegen.aip.v1.filtering) = {
    paths: ["*"]
  };

  // The parent organization to list users for.
  // Format: organizations/{organization}
  string parent = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "user.test.malonaz.com/Organization"
  ];

  // @autogen
  string filter = 2;

  // If set to true, soft deleted resources will be shown.
  bool show_deleted = 3;

  // @autogen.
  string order_by = 4;

  // Requested page size.
  int32 page_size = 5 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];

  // A page token, received from a previous `ListUsers` call.
  string page_token = 6;
}

// Response message for UserService.ListUsers.
message ListUsersResponse {
  // The list of users.
  repeated malonaz.test.user.v1.User users = 1;

  // A token to retrieve the next page.
  string next_page_token = 2;
}

// Request message for UserService.BatchGetUsers.
message BatchGetUsersRequest {
  // The parent organization that owns the users.
  // Format: organizations/{organization}
  string parent = 1 [(google.api.resource_reference).type = "user.test.malonaz.com/Organization"];

  // The resource names of the users to retrieve.
  // Format: organizations/{organization}/users/{user}
  // A maximum of 1000 users can be retrieved in a batch.
  repeated string names = 2 [
    (buf.validate.field).repeated = {
      min_items: 1
      max_items: 1000
      unique: true
      items: {
        string: {min_len: 1}
      }
    },
    (google.api.resource_reference).type = "user.test.malonaz.com/User"
  ];
}

// Response message for UserService.BatchGetUsers.
message BatchGetUsersResponse {
  // Users requested.
  repeated malonaz.test.user.v1.User users = 1;
}
