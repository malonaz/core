syntax = "proto3";

package malonaz.test.user.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "malonaz/canonicalize/v1/canonicalize.proto";
import "malonaz/codegen/model/v1/model.proto";
import "malonaz/codegen/nats/v1/nats.proto";

option go_package = "github.com/malonaz/core/genproto/test/user/v1";

// User represents a user within an organization.
message User {
  option (google.api.resource) = {
    type: "user.test.malonaz.com/User"
    pattern: "organizations/{organization}/users/{user}"
    singular: "user"
    plural: "users"
  };
  option (malonaz.codegen.nats.v1.event) = {
    stream: "malonaz.test.user.user_service.v1.user"
    created: {subject: "created"}
    updated: {subject: "updated"}
    deleted: {subject: "deleted"}
  };
  option (malonaz.codegen.model.v1.model_opts) = {
    table_name: "user_"
    id_column_name: "id"
  };

  // The resource name of the user.
  // Format: organizations/{organization}/users/{user}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The creation timestamp.
  google.protobuf.Timestamp create_time = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  // The last update timestamp.
  google.protobuf.Timestamp update_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  // The deletion timestamp.
  google.protobuf.Timestamp delete_time = 4 [
    (malonaz.codegen.model.v1.field_opts).nullable = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // The display name of the user.
  string display_name = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  // The email address of the user.
  string email_address = 6 [
    (buf.validate.field).string.email = true,
    (malonaz.canonicalize.v1.field).email_address = true
  ];

  // The phone number of the user.
  string phone_number = 7 [
    (malonaz.canonicalize.v1.field).phone_number = true,
    (malonaz.codegen.model.v1.field_opts).column_name = "phone_number_renamed"
  ];

  // The labels on this user.
  map<string, string> labels = 8 [
    (malonaz.codegen.model.v1.field_opts).as_json_bytes = true,
    (malonaz.codegen.model.v1.field_opts).nullable = true,
    (buf.validate.field).map = {
      max_pairs: 64
      keys: {
        string: {pattern: "^([a-zA-Z0-9]([a-zA-Z0-9.-]{0,251}[a-zA-Z0-9])?/)?[a-zA-Z0-9]([a-zA-Z0-9_.-]{0,61}[a-zA-Z0-9])?$"}
      }
      values: {
        string: {
          max_len: 63
          pattern: "^[a-z0-9_\\-\\p{L}]*$"
        }
      }
    }
  ];

  // A checksum computed by the server based on the current value of the resource.
  string etag = 9;

  // User metadata.
  UserMetadata metadata = 10 [(malonaz.codegen.model.v1.field_opts).as_json_bytes = true];
}

// Metadata for a user.
message UserMetadata {
  // The preferred language of the user (e.g., "en", "fr").
  string preferred_language = 1;

  // The timezone of the user (e.g., "America/New_York").
  string timezone = 2;
}
