syntax = "proto3";

package malonaz.test.library.library_service.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "malonaz/codegen/aip/v1/aip.proto";
import "malonaz/codegen/nats/v1/nats.proto";
import "malonaz/test/library/v1/shelf.proto";

option go_package = "github.com/malonaz/core/genproto/test/library/library_service/v1";

// ShelfService provides CRUD operations for managing shelves.
service ShelfService {
  option (google.api.default_host) = "library.test.malonaz.com";
  option (malonaz.codegen.nats.v1.stream) = {
    name: "malonaz.test.library.library_service.v1.shelf"
    max_age: {seconds: 2592000}
    retention: RETENTION_POLICY_LIMITS
    storage: STORAGE_TYPE_FILE
  };

  // Creates a shelf.
  rpc CreateShelf(CreateShelfRequest) returns (malonaz.test.library.v1.Shelf) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*}/shelves"
      body: "shelf"
    };
    option (google.api.method_signature) = "parent,shelf";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Shelf";
  }

  // Gets a shelf.
  rpc GetShelf(GetShelfRequest) returns (malonaz.test.library.v1.Shelf) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/shelves/*}"};
    option (google.api.method_signature) = "name";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Shelf";
  }

  // Updates a shelf.
  rpc UpdateShelf(UpdateShelfRequest) returns (malonaz.test.library.v1.Shelf) {
    option (google.api.http) = {
      patch: "/v1/{shelf.name=organizations/*/shelves/*}"
      body: "shelf"
    };
    option (google.api.method_signature) = "shelf,update_mask";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Shelf";
  }

  // Deletes a shelf.
  rpc DeleteShelf(DeleteShelfRequest) returns (malonaz.test.library.v1.Shelf) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/shelves/*}"};
    option (google.api.method_signature) = "name";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Shelf";
  }

  // Lists shelves.
  rpc ListShelves(ListShelvesRequest) returns (ListShelvesResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*}/shelves"};
    option (google.api.method_signature) = "parent";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Shelf";
  }

  // Gets multiple shelves in a single request.
  //
  // See: https://google.aip.dev/231 (Batch methods: Get).
  rpc BatchGetShelves(BatchGetShelvesRequest) returns (BatchGetShelvesResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*}/shelves:batchGet"};
    option (google.api.method_signature) = "parent,names";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Shelf";
  }
}

// Request message for ShelfService.CreateShelf.
message CreateShelfRequest {
  // The parent organization.
  // Format: organizations/{organization}
  string parent = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Organization"
  ];

  // The ID to use for the resource.
  string shelf_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 63
      pattern: "^[a-z0-9](-?[a-z0-9])*$"
    }
  ];

  // The shelf to create.
  malonaz.test.library.v1.Shelf shelf = 3 [(buf.validate.field).required = true];

  // A unique identifier for this request.
  string request_id = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // If set, validate the request and preview the response, but do not actually create the resource.
  bool validate_only = 5;
}

// Request message for ShelfService.GetShelf.
message GetShelfRequest {
  // The resource name of the shelf to retrieve.
  // Format: organizations/{organization}/shelves/{shelf}
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Shelf"
  ];
}

// Request message for ShelfService.UpdateShelf.
message UpdateShelfRequest {
  option (malonaz.codegen.aip.v1.update) = {
    paths: [
      "display_name",
      "genre",
      "correlation_id_2",
      "external_id",
      "metadata.capacity",
      "metadata.dummy",
      "metadata.notes",
      "metadata.author_to_note"
    ]
  };
  option (buf.validate.message).cel = {
    id: "shelf.name_required"
    message: "shelf.name must be set"
    expression: "has(this.shelf.name)"
  };

  // The shelf to update.
  malonaz.test.library.v1.Shelf shelf = 1 [(buf.validate.field).ignore = IGNORE_ALWAYS];

  // The list of fields to update.
  google.protobuf.FieldMask update_mask = 2 [(buf.validate.field).required = true];
}

// Request message for ShelfService.DeleteShelf.
message DeleteShelfRequest {
  // The resource name of the shelf to delete.
  // Format: organizations/{organization}/shelves/{shelf}
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Shelf"
  ];

  // If true, and the shelf is not found, the request will succeed
  // but no action will be taken on the server.
  bool allow_missing = 2;
}

// Request message for ShelfService.ListShelves.
message ListShelvesRequest {
  option (malonaz.codegen.aip.v1.pagination) = {default_page_size: 100};
  option (malonaz.codegen.aip.v1.ordering) = {
    paths: ["*"]
    default: "create_time desc"
  };
  option (malonaz.codegen.aip.v1.filtering) = {
    paths: ["*"]
  };

  // The parent organization to list shelves for.
  // Format: organizations/{organization}
  string parent = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Organization"
  ];

  // @autogen
  string filter = 2;

  // If set to true, soft deleted resources will be shown.
  bool show_deleted = 3;

  // @autogen.
  string order_by = 4;

  // Requested page size.
  int32 page_size = 5 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];

  // A page token, received from a previous `ListShelves` call.
  string page_token = 6;
}

// Response message for ShelfService.ListShelves.
message ListShelvesResponse {
  // The list of shelves.
  repeated malonaz.test.library.v1.Shelf shelves = 1;

  // A token to retrieve the next page.
  string next_page_token = 2;
}

// Request message for ShelfService.BatchGetShelves.
message BatchGetShelvesRequest {
  // The parent organization that owns the shelves.
  // Format: organizations/{organization}
  string parent = 1 [(google.api.resource_reference).type = "library.test.malonaz.com/Organization"];

  // The resource names of the shelves to retrieve.
  // Format: organizations/{organization}/shelves/{shelf}
  // A maximum of 1000 shelves can be retrieved in a batch.
  repeated string names = 2 [
    (buf.validate.field).repeated = {
      min_items: 1
      max_items: 1000
      unique: true
      items: {
        string: {min_len: 1}
      }
    },
    (google.api.resource_reference).type = "library.test.malonaz.com/Shelf"
  ];
}

// Response message for ShelfService.BatchGetShelves.
message BatchGetShelvesResponse {
  // Shelves requested.
  repeated malonaz.test.library.v1.Shelf shelves = 1;
}
