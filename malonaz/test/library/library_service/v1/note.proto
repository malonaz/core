syntax = "proto3";

package malonaz.test.library.library_service.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "malonaz/codegen/aip/v1/aip.proto";
import "malonaz/test/library/v1/note.proto";

option go_package = "github.com/malonaz/core/genproto/test/library/library_service/v1";

// Request message for LibraryService.CreateNote.
message CreateNoteRequest {
  // The parent resource. Either an author or a shelf.
  // Format: organizations/{organization}/authors/{author}
  // Format: organizations/{organization}/shelves/{shelf}
  string parent = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).child_type = "library.test.malonaz.com/Note"
  ];

  // The ID to use for the resource.
  string note_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 63
      pattern: "^[a-z0-9](-?[a-z0-9])*$"
    }
  ];

  // The note to create.
  malonaz.test.library.v1.Note note = 3 [(buf.validate.field).required = true];

  // A unique identifier for this request.
  string request_id = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // If set, validate the request and preview the response, but do not actually create the resource.
  bool validate_only = 5;
}

// Request message for LibraryService.GetNote.
message GetNoteRequest {
  // The resource name of the note to retrieve.
  // Format: organizations/{organization}/authors/{author}/notes/{note}
  // Format: organizations/{organization}/shelves/{shelf}/notes/{note}
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Note"
  ];
}

// Request message for LibraryService.UpdateNote.
message UpdateNoteRequest {
  option (malonaz.codegen.aip.v1.update) = {
    paths: [
      "display_name",
      "content",
      "labels"
    ]
  };
  option (buf.validate.message).cel = {
    id: "note.name_required"
    message: "note.name must be set"
    expression: "has(this.note.name)"
  };

  // The note to update.
  malonaz.test.library.v1.Note note = 1 [(buf.validate.field).ignore = IGNORE_ALWAYS];

  // The list of fields to update.
  google.protobuf.FieldMask update_mask = 2 [(buf.validate.field).required = true];
}

// Request message for LibraryService.DeleteNote.
message DeleteNoteRequest {
  // The resource name of the note to delete.
  // Format: organizations/{organization}/authors/{author}/notes/{note}
  // Format: organizations/{organization}/shelves/{shelf}/notes/{note}
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Note"
  ];

  // If true, and the note is not found, the request will succeed
  // but no action will be taken on the server.
  bool allow_missing = 2;

  // If set, the request will only succeed if the current etag matches this value.
  string etag = 3;
}

// Request message for LibraryService.ListNotes.
message ListNotesRequest {
  option (malonaz.codegen.aip.v1.pagination) = {default_page_size: 100};
  option (malonaz.codegen.aip.v1.ordering) = {
    paths: [
      "create_time",
      "update_time",
      "display_name"
    ]
    default: "create_time desc"
  };
  option (malonaz.codegen.aip.v1.filtering) = {
    paths: ["*"]
  };

  // The parent resource to list notes for. Either an author or a shelf.
  // Format: organizations/{organization}/authors/{author}
  // Format: organizations/{organization}/shelves/{shelf}
  string parent = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).child_type = "library.test.malonaz.com/Note"
  ];

  // @autogen
  string filter = 2;

  // If set to true, soft deleted resources will be shown.
  bool show_deleted = 3;

  // @autogen.
  string order_by = 4;

  // Requested page size.
  int32 page_size = 5 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];

  // A page token, received from a previous `ListNotes` call.
  string page_token = 6;
}

// Response message for LibraryService.ListNotes.
message ListNotesResponse {
  // The list of notes.
  repeated malonaz.test.library.v1.Note notes = 1;

  // A token to retrieve the next page.
  string next_page_token = 2;
}

// Request message for LibraryService.BatchGetNotes.
message BatchGetNotesRequest {
  // The parent resource that owns the notes. Either an author or a shelf.
  // Format: organizations/{organization}/authors/{author}
  // Format: organizations/{organization}/shelves/{shelf}
  string parent = 1 [(google.api.resource_reference).child_type = "library.test.malonaz.com/Note"];

  // The resource names of the notes to retrieve.
  // Format: organizations/{organization}/authors/{author}/notes/{note}
  // Format: organizations/{organization}/shelves/{shelf}/notes/{note}
  // A maximum of 1000 notes can be retrieved in a batch.
  repeated string names = 2 [
    (buf.validate.field).repeated = {
      min_items: 1
      max_items: 1000
      unique: true
      items: {
        string: {min_len: 1}
      }
    },
    (google.api.resource_reference).type = "library.test.malonaz.com/Note"
  ];
}

// Response message for LibraryService.BatchGetNotes.
message BatchGetNotesResponse {
  // Notes requested.
  repeated malonaz.test.library.v1.Note notes = 1;
}
