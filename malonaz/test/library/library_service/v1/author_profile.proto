syntax = "proto3";

package malonaz.test.library.library_service.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "malonaz/codegen/aip/v1/aip.proto";
import "malonaz/test/library/v1/author_profile.proto";

option go_package = "github.com/malonaz/core/genproto/test/library/library_service/v1";

// Request message for LibraryService.GetAuthorProfile.
message GetAuthorProfileRequest {
  // The resource name of the author profile to retrieve.
  // Format: organizations/{organization}/authors/{author}/profile
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/AuthorProfile"
  ];
}

// Request message for LibraryService.UpdateAuthorProfile.
message UpdateAuthorProfileRequest {
  option (malonaz.codegen.aip.v1.update) = {
    paths: [
      "bio",
      "website",
      "labels",
      "metadata"
    ]
  };
  option (buf.validate.message).cel = {
    id: "author_profile.name_required"
    message: "author_profile.name must be set"
    expression: "has(this.author_profile.name)"
  };

  // The author profile to update.
  malonaz.test.library.v1.AuthorProfile author_profile = 1 [(buf.validate.field).ignore = IGNORE_ALWAYS];

  // The list of fields to update.
  google.protobuf.FieldMask update_mask = 2 [(buf.validate.field).required = true];
}

// Request message for LibraryService.ListAuthorProfiles.
message ListAuthorProfilesRequest {
  option (malonaz.codegen.aip.v1.pagination) = {default_page_size: 100};
  option (malonaz.codegen.aip.v1.ordering) = {
    paths: [
      "create_time",
      "update_time"
    ]
    default: "create_time desc"
  };
  option (malonaz.codegen.aip.v1.filtering) = {
    paths: ["*"]
  };

  // The parent author to list author profiles for.
  // Format: organizations/{organization}/authors/{author}
  string parent = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Author"
  ];

  // @autogen
  string filter = 2;

  // If set to true, soft deleted resources will be shown.
  bool show_deleted = 3;

  // @autogen.
  string order_by = 4;

  // Requested page size.
  int32 page_size = 5 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];

  // A page token, received from a previous `ListAuthorProfiles` call.
  string page_token = 6;
}

// Response message for LibraryService.ListAuthorProfiles.
message ListAuthorProfilesResponse {
  // The list of author profiles.
  repeated malonaz.test.library.v1.AuthorProfile author_profiles = 1;

  // A token to retrieve the next page.
  string next_page_token = 2;
}

// Request message for LibraryService.BatchGetAuthorProfiles.
message BatchGetAuthorProfilesRequest {
  // The parent author that owns the author profiles.
  // Format: organizations/{organization}/authors/{author}
  string parent = 1 [(google.api.resource_reference).type = "library.test.malonaz.com/Author"];

  // The resource names of the author profiles to retrieve.
  // Format: organizations/{organization}/authors/{author}/profile
  // A maximum of 1000 author profiles can be retrieved in a batch.
  repeated string names = 2 [
    (buf.validate.field).repeated = {
      min_items: 1
      max_items: 1000
      unique: true
      items: {
        string: {min_len: 1}
      }
    },
    (google.api.resource_reference).type = "library.test.malonaz.com/AuthorProfile"
  ];
}

// Response message for LibraryService.BatchGetAuthorProfiles.
message BatchGetAuthorProfilesResponse {
  // Author profiles requested.
  repeated malonaz.test.library.v1.AuthorProfile author_profiles = 1;
}
