syntax = "proto3";

package malonaz.test.library.library_service.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "malonaz/canonicalize/v1/canonicalize.proto";
import "malonaz/codegen/aip/v1/aip.proto";
import "malonaz/codegen/nats/v1/nats.proto";
import "malonaz/test/library/v1/book.proto";

option go_package = "github.com/malonaz/core/genproto/test/library/library_service/v1";

// BookService provides CRUD operations for managing books.
service BookService {
  option (google.api.default_host) = "library.test.malonaz.com";
  option (malonaz.codegen.nats.v1.stream) = {
    name: "malonaz.test.library.library_service.v1.book"
    max_age: {seconds: 2592000}
    retention: RETENTION_POLICY_LIMITS
    storage: STORAGE_TYPE_FILE
  };

  // creates a book.
  rpc CreateBook(CreateBookRequest) returns (malonaz.test.library.v1.Book) {
    option (malonaz.canonicalize.v1.skip) = true;
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*/shelves/*}/books"
      body: "book"
    };
    option (google.api.method_signature) = "parent,book";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Book";
  }

  // Gets a book.
  rpc GetBook(GetBookRequest) returns (malonaz.test.library.v1.Book) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/shelves/*/books/*}"};
    option (google.api.method_signature) = "name";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Book";
  }

  // Updates a book.
  rpc UpdateBook(UpdateBookRequest) returns (malonaz.test.library.v1.Book) {
    option (google.api.http) = {
      patch: "/v1/{book.name=organizations/*/shelves/*/books/*}"
      body: "book"
    };
    option (google.api.method_signature) = "book,update_mask";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Book";
  }

  // Deletes a book.
  rpc DeleteBook(DeleteBookRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/shelves/*/books/*}"};
    option (google.api.method_signature) = "name";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Book";
  }

  // Lists books.
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*/shelves/*}/books"};
    option (google.api.method_signature) = "parent";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Book";
  }

  // Gets multiple books in a single request.
  //
  // See: https://google.aip.dev/231 (Batch methods: Get).
  rpc BatchGetBooks(BatchGetBooksRequest) returns (BatchGetBooksResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*/shelves/*}/books:batchGet"};
    option (google.api.method_signature) = "parent,names";
    option (malonaz.codegen.aip.v1.standard_method).resource = "library.test.malonaz.com/Book";
  }
}

// Request message for BookService.CreateBook.
message CreateBookRequest {
  // The parent shelf.
  // Format: organizations/{organization}/shelves/{shelf}
  string parent = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Shelf"
  ];

  // The ID to use for the resource.
  string book_id = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 63
      pattern: "^[a-z0-9](-?[a-z0-9])*$"
    }
  ];

  // The book to create.
  malonaz.test.library.v1.Book book = 3 [(buf.validate.field).required = true];

  // A unique identifier for this request.
  string request_id = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.uuid = true
  ];

  // If set, validate the request and preview the response, but do not actually create the resource.
  bool validate_only = 5;
}

// Request message for BookService.GetBook.
message GetBookRequest {
  // The resource name of the book to retrieve.
  // Format: organizations/{organization}/shelves/{shelf}/books/{book}
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Book"
  ];
}

// Request message for BookService.UpdateBook.
message UpdateBookRequest {
  option (malonaz.codegen.aip.v1.update) = {
    paths: [
      "title",
      "author",
      "isbn",
      "publication_year",
      "page_count",
      "metadata"
    ]
  };
  option (buf.validate.message).cel = {
    id: "book.name_required"
    message: "book.name must be set"
    expression: "has(this.book.name)"
  };

  // The book to update.
  malonaz.test.library.v1.Book book = 1 [(buf.validate.field).ignore = IGNORE_ALWAYS];

  // The list of fields to update.
  google.protobuf.FieldMask update_mask = 2 [(buf.validate.field).required = true];

  // A precondition for update.
  string precondition = 3;
}

// Request message for BookService.DeleteBook.
message DeleteBookRequest {
  // The resource name of the book to delete.
  // Format: organizations/{organization}/shelves/{shelf}/books/{book}
  string name = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Book"
  ];

  // If true, and the book is not found, the request will succeed
  // but no action will be taken on the server.
  bool allow_missing = 2;

  // If set, the request will only succeed if the current etag matches this value.
  string etag = 3;
}

// Request message for BookService.ListBooks.
message ListBooksRequest {
  option (malonaz.codegen.aip.v1.pagination) = {default_page_size: 100};
  option (malonaz.codegen.aip.v1.ordering) = {
    paths: [
      "create_time",
      "update_time",
      "title",
      "publication_year"
    ]
    default: "create_time desc"
  };
  option (malonaz.codegen.aip.v1.filtering) = {
    paths: [
      "title",
      "author",
      "isbn",
      "publication_year",
      "metadata",
      "duration",
      "labels"
    ]
  };

  // The parent shelf to list books for.
  // Format: organizations/{organization}/shelves/{shelf}
  string parent = 1 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "library.test.malonaz.com/Shelf"
  ];

  // @autogen
  string filter = 2;

  // @autogen.
  string order_by = 3;

  // Requested page size.
  int32 page_size = 4 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];

  // A page token, received from a previous `ListBooks` call.
  string page_token = 5;
}

// Response message for BookService.ListBooks.
message ListBooksResponse {
  // The list of books.
  repeated malonaz.test.library.v1.Book books = 1;

  // A token to retrieve the next page.
  string next_page_token = 2;
}

// Request message for BookService.BatchGetBooks.
message BatchGetBooksRequest {
  // The parent shelf that owns the books.
  // Format: organizations/{organization}/shelves/{shelf}
  string parent = 1 [(google.api.resource_reference).type = "library.test.malonaz.com/Shelf"];

  // The resource names of the books to retrieve.
  // Format: organizations/{organization}/shelves/{shelf}/books/{book}
  // A maximum of 1000 books can be retrieved in a batch.
  repeated string names = 2 [
    (buf.validate.field).repeated = {
      min_items: 1
      max_items: 1000
      unique: true
      items: {
        string: {min_len: 1}
      }
    },
    (google.api.resource_reference).type = "library.test.malonaz.com/Book"
  ];
}

// Response message for BookService.BatchGetBooks.
message BatchGetBooksResponse {
  // Books requested.
  repeated malonaz.test.library.v1.Book books = 1;
}
