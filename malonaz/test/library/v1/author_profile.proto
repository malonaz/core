syntax = "proto3";

package malonaz.test.library.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "malonaz/codegen/model/v1/model.proto";

option go_package = "github.com/malonaz/core/genproto/test/library/v1";

// AuthorProfile is a singleton child of Author, auto-created with its parent.
message AuthorProfile {
  option (google.api.resource) = {
    type: "library.test.malonaz.com/AuthorProfile"
    pattern: "organizations/{organization}/authors/{author}/profile"
    singular: "authorProfile"
    plural: "authorProfiles"
  };
  option (malonaz.codegen.model.v1.model_opts) = {schema_name: "library"};

  // The resource name of the author profile.
  // Format: organizations/{organization}/authors/{author}/profile
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The creation timestamp.
  google.protobuf.Timestamp create_time = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  // The last update timestamp.
  google.protobuf.Timestamp update_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  // The deletion timestamp.
  google.protobuf.Timestamp delete_time = 4 [
    (malonaz.codegen.model.v1.field_opts).nullable = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // A short bio for the profile.
  string bio = 5;

  // The website URL.
  string website = 6 [(buf.validate.field).string.max_len = 2048];

  // A checksum computed by the server based on the current value of the resource.
  string etag = 7;

  // The labels on this author profile.
  map<string, string> labels = 8 [
    (malonaz.codegen.model.v1.field_opts).as_json_bytes = true,
    (malonaz.codegen.model.v1.field_opts).nullable = true,
    (buf.validate.field).map = {
      max_pairs: 64
      keys: {
        string: {pattern: "^([a-zA-Z0-9]([a-zA-Z0-9.-]{0,251}[a-zA-Z0-9])?/)?[a-zA-Z0-9]([a-zA-Z0-9_.-]{0,61}[a-zA-Z0-9])?$"}
      }
      values: {
        string: {
          max_len: 63
          pattern: "^[a-z0-9_\\-\\p{L}]*$"
        }
      }
    }
  ];

  // Author profile metadata.
  AuthorProfileMetadata metadata = 9 [
    (malonaz.codegen.model.v1.field_opts).as_json_bytes = true,
    (malonaz.codegen.model.v1.field_opts).nullable = true
  ];

  // Join on parent author: display_name.
  string author_display_name = 10 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (malonaz.codegen.model.v1.field_opts).join = {
      parent: "library.test.malonaz.com/Author"
      field: "display_name"
    }
  ];

  // Join on parent author: email_address.
  string author_email_address = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (malonaz.codegen.model.v1.field_opts).join = {
      parent: "library.test.malonaz.com/Author"
      field: "email_address"
    }
  ];
}

// Metadata for an author profile.
message AuthorProfileMetadata {
  // Preferred language of the author.
  string preferred_language = 1;
}
