syntax = "proto3";

package malonaz.test.library.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "google/type/money.proto";
import "malonaz/canonicalize/v1/canonicalize.proto";
import "malonaz/codegen/aip/v1/aip.proto";
import "malonaz/codegen/model/v1/model.proto";
import "malonaz/codegen/nats/v1/nats.proto";
import "malonaz/test/library/v1/shelf.proto";

option go_package = "github.com/malonaz/core/genproto/test/library/v1";

// Book represents a book on a shelf.
message Book {
  option (google.api.resource) = {
    type: "library.test.malonaz.com/Book"
    pattern: "organizations/{organization}/shelves/{shelf}/books/{book}"
    singular: "book"
    plural: "books"
  };
  option (malonaz.codegen.nats.v1.event) = {
    stream: "malonaz.test.library.v1.book"
    updated: {
      subject: "updated"
      cel: "book.publication_year > 2007"
    }
    deleted: {subject: "deleted"}
  };
  option (malonaz.codegen.model.v1.model_opts) = {schema_name: "library"};
  option (malonaz.codegen.aip.v1.uuid_namespace) = "a1b2c3d4-e5f6-7890-abcd-ef1234567890";

  // The resource name of the book.
  // Format: organizations/{organization}/shelves/{shelf}/books/{book}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The creation timestamp.
  google.protobuf.Timestamp create_time = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  // The last update timestamp.
  google.protobuf.Timestamp update_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The title of the book.
  string title = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 512
  }];

  // The resource name of the author.
  // Format: organizations/{organization}/authors/{author}
  string author = 5 [
    (google.api.resource_reference).type = "library.test.malonaz.com/Author",
    (buf.validate.field).required = true
  ];

  // The ISBN of the book.
  string isbn = 6 [(buf.validate.field).string.max_len = 17];

  // The publication year.
  int32 publication_year = 7;

  // The number of pages.
  int32 page_count = 8 [(buf.validate.field).int32.gte = 0];

  // The duration of the book.
  google.protobuf.Duration duration = 9;

  // The labels on this book.
  map<string, string> labels = 10 [
    (malonaz.codegen.model.v1.field_opts).as_json_bytes = true,
    (malonaz.codegen.model.v1.field_opts).nullable = true,
    (buf.validate.field).map = {
      max_pairs: 64
      keys: {
        string: {pattern: "^([a-zA-Z0-9]([a-zA-Z0-9.-]{0,251}[a-zA-Z0-9])?/)?[a-zA-Z0-9]([a-zA-Z0-9_.-]{0,61}[a-zA-Z0-9])?$"}
      }
      values: {
        string: {
          max_len: 63
          pattern: "^[a-z0-9_\\-\\p{L}]*$"
        }
      }
    }
  ];

  // A checksum computed by the server based on the current value of the resource.
  string etag = 11;

  // Book metadata.
  BookMetadata metadata = 12 [(malonaz.codegen.model.v1.field_opts).as_json_bytes = true];

  // Join on parent.
  string shelf_external_id = 13 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (malonaz.codegen.model.v1.field_opts).nullable = true,
    (malonaz.codegen.model.v1.field_opts).join = {
      parent: "library.test.malonaz.com/Shelf"
      field: "external_id"
    }
  ];

  // The genre of books on this shelf.
  ShelfGenre shelf_genre = 14 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (malonaz.codegen.model.v1.field_opts).join = {
      parent: "library.test.malonaz.com/Shelf"
      field: "genre"
    }
  ];
}

// Metadata for a book.
message BookMetadata {
  // A brief summary of the book.
  string summary = 1;
  // The language of the book (e.g., "en", "fr").
  string language = 2;
  // Phone number of the author of this book.
  string phone_number = 3 [(malonaz.canonicalize.v1.field).phone_number = true];
  // The duration of the book.
  google.protobuf.Duration duration = 4;
}

// Dummy message.
message Dummy {
  // Subtotal across all line items before tax, fees, and discount.
  google.type.Money subtotal = 1;

  // Total tax computed from taxable line items and the tax rate.
  google.type.Money tax = 2;

  // A plain string field.
  string title = 3;

  // A plain int32 field.
  int32 quantity = 4;

  // A plain double field.
  double rate = 5;

  // A plain bool field.
  bool active = 6;

  // A timestamp field.
  google.protobuf.Timestamp expire_time = 7;

  // A duration field.
  google.protobuf.Duration duration = 8;

  // A repeated string field.
  repeated string tags = 9;

  // A map field.
  map<string, string> labels = 10;

  // A nested message field.
  BookMetadata metadata = 11;

  // An adjustment applied to the dummy.
  DummyAdjustment adjustment = 12;
}

// A value expressed as either a fixed monetary amount or a percentage.
message DummyAdjustment {
  // The kind.
  oneof kind {
    // A fixed monetary amount.
    google.type.Money amount = 1;

    // A percentage value (0.0-100.0).
    double percentage = 2;
  }
}
