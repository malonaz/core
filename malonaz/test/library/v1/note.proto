syntax = "proto3";

package malonaz.test.library.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "malonaz/codegen/model/v1/model.proto";

option go_package = "github.com/malonaz/core/genproto/test/library/v1";

// Note represents a note attached to either an author or a shelf.
message Note {
  option (google.api.resource) = {
    type: "library.test.malonaz.com/Note"
    pattern: "organizations/{organization}/notes/{note}"
    pattern: "organizations/{organization}/authors/{author}/notes/{note}"
    pattern: "organizations/{organization}/shelves/{shelf}/notes/{note}"
    singular: "note"
    plural: "notes"
  };
  option (malonaz.codegen.model.v1.model_opts) = {schema_name: "library"};

  // The resource name of the note.
  // Format: organizations/{organization}/authors/{author}/notes/{note}
  // Format: organizations/{organization}/shelves/{shelf}/notes/{note}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The creation timestamp.
  google.protobuf.Timestamp create_time = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  // The last update timestamp.
  google.protobuf.Timestamp update_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  // The deletion timestamp.
  google.protobuf.Timestamp delete_time = 4 [
    (malonaz.codegen.model.v1.field_opts).nullable = true,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // The display name of the note.
  string display_name = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  // The content of the note.
  string content = 6 [(buf.validate.field).string.max_len = 4096];

  // The labels on this note.
  map<string, string> labels = 7 [
    (malonaz.codegen.model.v1.field_opts).as_json_bytes = true,
    (malonaz.codegen.model.v1.field_opts).nullable = true,
    (buf.validate.field).map = {
      max_pairs: 64
      keys: {
        string: {pattern: "^([a-zA-Z0-9]([a-zA-Z0-9.-]{0,251}[a-zA-Z0-9])?/)?[a-zA-Z0-9]([a-zA-Z0-9_.-]{0,61}[a-zA-Z0-9])?$"}
      }
      values: {
        string: {
          max_len: 63
          pattern: "^[a-z0-9_\\-\\p{L}]*$"
        }
      }
    }
  ];

  // A checksum computed by the server based on the current value of the resource.
  string etag = 8;
}
