syntax = "proto3";

package malonaz.grpc.v1;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/malonaz/core/genproto/grpc/v1";

// HookOptions configures how a message participates in the hook system.
// When a message carries this annotation, the middleware will walk the RPC
// message tree and invoke any handlers registered for the specified key.
message HookOptions {
  // key is the identifier used to look up registered handlers at runtime.
  // Multiple handlers can be registered for the same key.
  string key = 1;

  // on_request triggers registered handlers when this message appears
  // anywhere in the request message tree of an RPC.
  bool on_request = 2;

  // on_response triggers registered handlers when this message appears
  // anywhere in the response message tree of an RPC.
  bool on_response = 3;
}
