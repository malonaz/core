syntax = "proto3";

package malonaz.ai.v1;

import "buf/validate/validate.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/rpc/status.proto";
import "malonaz/json/v1/schema.proto";

option go_package = "github.com/malonaz/core/genproto/ai/v1";

// Represents a tool that can be called by the AI model.
message Tool {
  // A unique name for this tool.
  string name = 1 [(buf.validate.field).required = true];

  // A description of what the tool does.
  string description = 2 [(buf.validate.field).required = true];

  // The json schema of the expected object to be returned.
  malonaz.json.v1.Schema json_schema = 3;

  // Annotations about this tool (not transmitted to the ai provider).
  // This should be used by tooling.
  // All annotations are inherited by any tool call created by this tool.
  map<string, string> annotations = 4;
}

// A tool call that the model wants to invoke.
message ToolCall {
  // The id of this tool call.
  string id = 1 [(buf.validate.field).required = true];

  // The name of the tool to call.
  string name = 2 [(buf.validate.field).required = true];

  // The arguments to call the tool with.
  google.protobuf.Struct arguments = 3 [(buf.validate.field).required = true];

  // Provider specific extra fields.
  google.protobuf.Struct extra_fields = 4;

  // Annotations populated from the tool that created this tool call.
  map<string, string> annotations = 5;

  // If true, this is a partial tool call.
  bool partial = 6;
}

// The result of executing a tool call.
message ToolResult {
  // Name of the tool that created this result.
  string tool_name = 1;

  // ID of the tool call this message is responding to.
  string tool_call_id = 2;

  // The outcome of the tool execution.
  oneof result {
    option (buf.validate.oneof).required = true;

    // The output returned by the tool execution.
    // May contain structured data (e.g., JSON) or plain text depending on the tool.
    string content = 3;

    // The output returned by the tool execution as structured data.
    google.protobuf.Value structured_content = 4;

    // Error if the tool execution failed.
    google.rpc.Status error = 5;
  }
}

// Controls which tool(s) the model should use.
message ToolChoice {
  option (buf.validate.message).cel = {
    id: "ai.v1.ToolChoice.mode_not_unspecified"
    message: "mode cannot be TOOL_CHOICE_MODE_UNSPECIFIED"
    expression: "!has(this.mode) || this.mode != 0"
  };

  // The choice.
  oneof choice {
    option (buf.validate.oneof).required = true;

    // Let the model decide whether to call a tool.
    ToolChoiceMode mode = 1 [(buf.validate.field).enum.defined_only = true];

    // Force the model to call a specific tool by name.
    string tool_name = 2;
  }
}

// Mode for tool choice.
enum ToolChoiceMode {
  // Used to detect an unset field.
  TOOL_CHOICE_MODE_UNSPECIFIED = 0;

  // Do not use any tool.
  TOOL_CHOICE_MODE_NONE = 1;

  // Let the model decide whether to call a tool.
  TOOL_CHOICE_MODE_AUTO = 2;

  // Require the model to call at least one tool.
  TOOL_CHOICE_MODE_REQUIRED = 3;
}

// =============================== TOOL SET ================================

// Represents a discoverable set of tools.
message ToolSet {
  // Name of this tool set.
  string name = 1;

  // The tool used to discover the tools in this set.
  Tool discovery_tool = 2 [(buf.validate.field).required = true];

  // The tools available in this set.
  repeated Tool tools = 3 [(buf.validate.field).required = true];

  // Tracks the times at which tools were discovered.
  map<string, int64> tool_name_to_discover_timestamp = 4;
}

// Configuration for a tool set schema.
message ToolSetSchemaConfiguration {
  // Control which field are included in the tool schema.
  google.protobuf.FieldMask field_mask = 1;

  // Set a max depth for the schema (defaults to 5).
  int32 with_max_depth = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 10
  }];

  // (ONLY WORKS FOR RPCS). If set, we inject a `response_field_mask` field in the tool schema, which allows the LLM to
  // return a field mask to apply to the tool call result. This is useful in letting the LLM only fetch the data it needs
  // rather than being returned tool results with fields it does not need.
  bool with_response_read_mask = 3;

  // (ONLY WORKS FOR RPCS). If set, we include the schema of the response in the tool description.
  // This can be quite verbose so use with care.
  int32 with_response_schema_max_depth = 4 [(buf.validate.field).int32 = {
    gte: 0
    lte: 10
  }];
}

// Represents a tool discovery call.
message ToolDiscoveryCall {
  // Name of the tool set.
  string tool_set_name = 1;
  // The names of the tools to be discovered.
  repeated string tool_names = 2;
}

// Represents an RPC call.
message RpcCall {
  // The full name of the service.
  string service_full_name = 1;
  // The full name of the method.
  string method_full_name = 2;
  // The request object.
  google.protobuf.Struct request = 3;
  // Optional field to specify which fields we should include in the tool result response.
  google.protobuf.FieldMask read_mask = 4;
}

// A reference to a protobuf descriptor.
message DescriptorReference {
  // The descriptor full name.
  oneof full_name {
    option (buf.validate.oneof).required = true;
    // The fully qualified name of the message.
    string message = 1;
    // The fully qualified name of the method.
    string method = 2;
  }
}
